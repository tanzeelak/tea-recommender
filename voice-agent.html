<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sage: Tea educator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --brand: #B85C38; --brand-dark: #9A4A2C; --brand-bg: #FAEEE8;
      --green: #5A8A6A; --red: #FA5252;
      --s50: #FAF8F6; --s100: #F2EDE8; --s200: #E4D9D0;
      --s300: #C9B8AA; --s400: #A8917F; --s500: #7A6355;
      --s600: #5C4A3D; --s700: #3D3028; --s800: #261E18; --s900: #130F0C;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--s900); display: flex; flex-direction: column;
      background:
        radial-gradient(1200px 600px at 80% -10%, #F2D9CC 0%, transparent 60%),
        radial-gradient(900px 500px at -10% 110%, #D6E8D8 0%, transparent 55%),
        var(--s50);
    }

    header {
      background: rgba(255,255,255,.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--s200);
      padding: 0 1.5rem; height: 3.5rem;
      display: flex; align-items: center; gap: .75rem;
      flex-shrink: 0;
    }
    .logo img { height: 22px; display: block; }
    .page-title { font-size: .875rem; color: var(--s500); padding-left: .75rem; border-left: 1px solid var(--s200); }
    .header-spacer { flex: 1; }
    .status {
      display: flex; align-items: center; gap: .5rem;
      font-size: .8125rem; color: var(--s500);
      padding: .375rem .75rem; border-radius: 999px;
      background: var(--s100); border: 1px solid var(--s200);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .status.ok { color: var(--green); background: #E6FCF5; border-color: #C3FAE8; }
    .status.ok .dot { animation: pulse 2s ease-in-out infinite; }
    .status.err { color: var(--red); background: #FFF5F5; border-color: #FFE3E3; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    .layout { flex: 1; display: grid; grid-template-columns: 360px 1fr 380px; min-height: 0; }
    @media (max-width: 1100px) { .layout { grid-template-columns: 320px 1fr; } .map-panel { display: none; } }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }

    aside {
      border-right: 1px solid var(--s200);
      background: rgba(255,255,255,.6); backdrop-filter: blur(8px);
      padding: 1.5rem; overflow-y: auto;
      display: flex; flex-direction: column; gap: 1rem;
    }
    aside h2 {
      font-size: .6875rem; font-weight: 600; color: var(--s500);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: .5rem;
    }
    .field { display: flex; flex-direction: column; gap: .375rem; }
    label { font-size: .75rem; font-weight: 500; color: var(--s600); }
    input, select, textarea {
      width: 100%; padding: .5rem .625rem; border: 1px solid var(--s200); border-radius: 8px;
      font: inherit; font-size: .875rem; color: var(--s900); background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(54,77,234,.12); }
    textarea { resize: vertical; min-height: 96px; line-height: 1.5; }

    .btn {
      width: 100%; padding: .75rem 1rem; border: none; border-radius: 10px;
      font-size: .9375rem; font-weight: 600; cursor: pointer; color: #fff; background: var(--brand);
      transition: all .15s; display: flex; align-items: center; justify-content: center; gap: .5rem;
      box-shadow: 0 1px 2px rgba(54,77,234,.3), 0 4px 12px rgba(54,77,234,.15);
    }
    .btn:hover { background: var(--brand-dark); transform: translateY(-1px); }
    .btn:disabled { opacity: .5; cursor: default; transform: none; }
    .btn.on { background: var(--red); box-shadow: 0 1px 2px rgba(250,82,82,.3), 0 4px 12px rgba(250,82,82,.15); }
    .btn.on:hover { background: #e03131; }
    .btn svg { width: 18px; height: 18px; }

    main {
      display: flex; flex-direction: column; min-height: 0;
      padding: 1.5rem 2rem 2rem;
    }

    .transcript {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
      background: #fff; border: 1px solid var(--s200); border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(15,23,42,.04), 0 4px 16px rgba(15,23,42,.04);
    }
    .transcript-hd {
      padding: .75rem 1.25rem; background: var(--s50); border-bottom: 1px solid var(--s200);
      font-size: .6875rem; font-weight: 600; color: var(--s500);
      text-transform: uppercase; letter-spacing: .08em;
      display: flex; justify-content: space-between; align-items: center;
    }
    .speakers { display: flex; gap: .375rem; }
    .speaker {
      display: flex; align-items: center; gap: .375rem;
      padding: .25rem .625rem; border-radius: 999px;
      background: var(--s100); color: var(--s400);
      font-size: .6875rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em;
      transition: background .2s, color .2s;
    }
    .speaker .dot { width: 6px; height: 6px; }
    .speaker.user.active { background: var(--brand-bg); color: var(--brand); }
    .speaker.agent.active { background: #D6E8D8; color: var(--green); }
    .speaker.active .dot { animation: pulse 1s ease-in-out infinite; }
    #msgs { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: .5rem; }
    .empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--s400); font-size: .875rem;
    }
    .msg {
      padding: .75rem 1rem; border-radius: 12px;
      font-size: .9375rem; line-height: 1.5;
      max-width: 85%; animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .msg .who {
      font-size: .6875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: var(--s500); margin-bottom: .25rem;
    }
    .msg.u { background: var(--brand-bg); align-self: flex-end; }
    .msg.u .who { color: var(--brand); }
    .msg.a { background: #D6E8D8; align-self: flex-start; }
    .msg.a .who { color: var(--green); }

    .map-panel {
      border-left: 1px solid var(--s200);
      background: rgba(255,255,255,.6); backdrop-filter: blur(8px);
      display: flex; flex-direction: column; min-height: 0;
    }
    .map-hd {
      padding: .75rem 1.25rem; background: var(--s50); border-bottom: 1px solid var(--s200);
      font-size: .6875rem; font-weight: 600; color: var(--s500);
      text-transform: uppercase; letter-spacing: .08em; flex-shrink: 0;
    }
    #map { flex: 1; min-height: 0; background: var(--s100); }
    .map-info {
      padding: 1rem 1.25rem; border-top: 1px solid var(--s200); flex-shrink: 0;
      background: rgba(255,255,255,.7);
    }
    .map-info .tea-name { font-size: 1rem; font-weight: 600; color: var(--brand-dark); margin-bottom: .25rem; }
    .map-info .tea-origin { font-size: .8125rem; color: var(--s500); }
    .map-info.empty .tea-name { color: var(--s400); font-weight: 500; }
    .leaflet-popup-content { font-family: system-ui, -apple-system, sans-serif; }
    .leaflet-popup-content b { color: var(--brand-dark); }
  </style>
</head>
<body>
<header>
  <a class="logo" href="https://www.assemblyai.com">
    <img src="https://cdn.prod.website-files.com/67a08d9d7d19f8fb63692894/67b5bd3d9e8ee1a6b2410b9e_AssemblyAI%20Logo.svg" alt="AssemblyAI">
  </a>
  <span class="page-title">Sage: Tea educator</span>
  <div class="header-spacer"></div>
  <div class="status" id="status"><span class="dot"></span><span id="status-text">Ready</span></div>
</header>

<div class="layout">
  <aside>
    <input id="key" type="hidden" value="83b89ca2669141e697c523ceda46a917">

    <div class="field">
      <label for="mic">Microphone</label>
      <select id="mic"><option value="">Default microphone</option></select>
    </div>

    <input id="voice" type="hidden" value="mia">
    <textarea id="prompt" style="display:none">You are Sage, a sharp, curious tea educator. You do not act like a shop hostess simply offering whatever is on the shelf. You teach people what a tea is, where it comes from, why it tastes or feels that way, and which tea fits their problem, mood, moment, or curiosity.

YOU KNOW TEA GLOBALLY:
- China and Taiwan: aged whites from Fuding and Zhenghe, raw sheng and ripe shou puerh from Yiwu, Bulang, Jingmai, Bingdao, Lao Banzhang, Wuyi rock oolongs, Dan Cong, Tieguanyin, GABA oolong, jasmine, osmanthus, chrysanthemum
- Japan and Korea: sencha, gyokuro, matcha, hojicha, genmaicha, Korean sejak and ujeon greens, balhyocha, lotus and barley infusions
- South Asia: Darjeeling first flush, Assam, Nilgiri, Kangra, Ceylon, Nepali oolongs and blacks, Bangladeshi teas from Sylhet and Srimangal with bright black teas, green teas, and emerging orthodox styles
- Southeast Asia: Thai miang and oolongs, Vietnamese shan tuyet, Indonesian Java and Sumatra teas, Myanmar lahpet, Lao forest teas from Phongsaly and Luang Prabang, including old-tree greens, whites, and dark fermented teas
- Africa: Kenyan purple tea, orthodox Kenyan black teas, Rwandan black, green, and white teas from high-elevation gardens, Malawian Satemwa-style blacks and whites, Tanzanian and Ugandan teas, South African rooibos and honeybush
- Middle East, North Africa, and Europe: Moroccan mint, Turkish Rize black tea, Persian saffron tea, Georgian black and green teas, Greek mountain tea
- South America and beyond: Argentinian and Brazilian black and green teas, yerba mate, guayusa, yaupon, herbal and floral tisanes when they fit the person's needs

TEACH WHILE RECOMMENDING:
- Give a specific tea, origin, and reason in plain language.
- Include lesser-known origins naturally when they are a good fit: Bangladesh, Rwanda, Laos, Malawi, Georgia, Vietnam, Nepal, Thailand, Myanmar, Indonesia.
- Explain processing, terroir, caffeine, flavor, body effect, brewing, aging, or cultural context when relevant.
- If someone asks broadly, compare 2-3 teas across different countries instead of defaulting to China, Japan, or India.
- Be clear about tisanes versus true tea from Camellia sinensis, but do not be pedantic.

MATCH TEAS TO WHAT PEOPLE ACTUALLY NEED:

By problem / symptom:
- Can't sleep, wired brain → GABA oolong, decade-aged white, hojicha, rooibos, or honeybush
- Bloated, sluggish digestion → ripe puerh after meals, Moroccan mint, rose, chrysanthemum, peppermint, or Myanmar lahpet context if they want food culture
- Anxious, overwhelmed → GABA oolong, aged white, osmanthus blend, Korean balhyocha, or Rwandan white tea
- Inflamed, achy joints → saffron tea, turmeric-ginger, rooibos, or aged puerh
- Screen fatigue, dry eyes → chrysanthemum, goji chrysanthemum, or a lighter green tea
- Low energy but no coffee crash → Kenyan purple tea, first-flush Darjeeling, Bangladeshi black tea, or Rwandan black tea
- Hormonal issues, PMS → rose tea, spearmint, saffron, or low-caffeine rooibos
- Want antioxidants → aged white, Kenyan purple tea, green tea, rooibos, or Rwandan white tea

By curiosity / vibe:
- Want something cosy and slow → aged shou puerh, roasted oolong, hojicha, or Bangladeshi milk tea style
- Feeling fancy → saffron tea, gyokuro, premium Yiwu sheng, or Rwandan silver needle
- Need focus without jitters → Dan Cong, gyokuro in small pours, Darjeeling, or Lao old-tree green tea
- Want floral and pretty → osmanthus white, rose green, jasmine, Nepali oolong, or Georgian green tea
- Hosting friends, crowd-pleaser → Ceylon, Moroccan mint, rooibos, Bangladeshi black tea, or Rwandan black tea
- Adventurous, never had it before → Lao forest tea, Bangladeshi orthodox black, Kenyan purple tea, Rwandan white tea, Myanmar lahpet, or Vietnamese shan tuyet
- Want to start a collection → suggest a young sheng puerh cake, aged white cakes, or a country flight comparing Laos, Bangladesh, Rwanda, Nepal, and Kenya

Be direct and prescriptive. Don't hedge. Say "start with a Lao forest green" not "you might want to consider." Be casual, a little dry, genuinely enthusiastic without being performative. Keep every reply under 50 words. No exceptions.</textarea>
    <input id="greeting" type="hidden" value="What tea world are we exploring today — origin, flavor, mood, or a problem to solve?">

    <button class="btn" id="btn">
      <svg id="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="9" y="2" width="6" height="10" rx="3"/>
        <path d="M19 10v1a7 7 0 01-14 0v-1"/><path d="M12 18v4"/><path d="M8 22h8"/>
      </svg>
      <span id="btn-label">Connect</span>
    </button>
  </aside>

  <main>
    <div class="transcript" id="log">
      <div class="transcript-hd">
        <span>Transcript</span>
        <div class="speakers">
          <div class="speaker user" id="spk-user"><span class="dot"></span>You</div>
          <div class="speaker agent" id="spk-agent"><span class="dot"></span>Sage: Tea educator</div>
        </div>
      </div>
      <div id="msgs">
        <div class="empty" id="empty-msg">Click Connect to chat with Sage</div>
      </div>
    </div>
  </main>

  <div class="map-panel">
    <div class="map-hd">Tea Origin Map</div>
    <div id="map"></div>
    <div class="map-info empty" id="map-info">
      <div class="tea-name" id="map-tea">No tea detected yet</div>
      <div class="tea-origin" id="map-origin">Ask Sage about a tea to see where it comes from.</div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const RATE = 24_000;

// --- Tea origin map ---
// Keywords are matched (case-insensitive) against Sage's transcript.
// More specific entries should appear before broader ones.
const TEA_ORIGINS = [
  { kw: ['lao banzhang', 'banzhang'], tea: 'Lao Banzhang Sheng Puerh', origin: 'Bulang Mountain, Yunnan, China', lat: 21.94, lng: 100.42 },
  { kw: ['bingdao'], tea: 'Bingdao Sheng Puerh', origin: 'Lincang, Yunnan, China', lat: 23.77, lng: 100.05 },
  { kw: ['jingmai'], tea: 'Jingmai Mountain Puerh', origin: 'Jingmai, Yunnan, China', lat: 22.18, lng: 100.00 },
  { kw: ['bulang'], tea: 'Bulang Mountain Puerh', origin: 'Bulang Mountain, Yunnan, China', lat: 21.96, lng: 100.45 },
  { kw: ['yiwu'], tea: 'Yiwu Sheng Puerh', origin: 'Yiwu, Yunnan, China', lat: 21.93, lng: 101.42 },
  { kw: ['puerh', 'pu-erh', 'pu erh', 'sheng', 'shou'], tea: 'Puerh', origin: 'Yunnan, China', lat: 22.78, lng: 100.97 },
  { kw: ['fuding', 'silver needle', 'shou mei', 'bai mu dan', 'white tea', 'aged white'], tea: 'Aged White Tea', origin: 'Fuding, Fujian, China', lat: 27.20, lng: 120.22 },
  { kw: ['zhenghe'], tea: 'Zhenghe White Tea', origin: 'Zhenghe, Fujian, China', lat: 27.37, lng: 118.85 },
  { kw: ['wuyi', 'rock oolong'], tea: 'Wuyi Rock Oolong', origin: 'Wuyi Mountains, Fujian, China', lat: 27.72, lng: 117.97 },
  { kw: ['tieguanyin', 'tie guan yin'], tea: 'Aged Tieguanyin', origin: 'Anxi, Fujian, China', lat: 25.06, lng: 118.19 },
  { kw: ['dan cong', 'dancong', 'phoenix'], tea: 'Dan Cong Oolong', origin: 'Phoenix Mountain, Guangdong, China', lat: 23.75, lng: 116.62 },
  { kw: ['gaba oolong', 'gaba'], tea: 'GABA Oolong', origin: 'Taiwan', lat: 23.70, lng: 120.96 },
  { kw: ['darjeeling'], tea: 'Darjeeling First Flush', origin: 'Darjeeling, India', lat: 27.04, lng: 88.26 },
  { kw: ['nilgiri'], tea: 'Nilgiri Black Tea', origin: 'Nilgiri Hills, India', lat: 11.41, lng: 76.70 },
  { kw: ['ceylon'], tea: 'Ceylon Black Tea', origin: 'Sri Lanka', lat: 6.95, lng: 80.78 },
  { kw: ['kenyan purple', 'purple tea', 'kenyan'], tea: 'Kenyan Purple Tea', origin: 'Kericho Highlands, Kenya', lat: -0.37, lng: 35.28 },
  { kw: ['moroccan mint', 'moroccan'], tea: 'Moroccan Mint', origin: 'Morocco', lat: 31.79, lng: -7.09 },
  { kw: ['rooibos', 'honeybush'], tea: 'Rooibos & Honeybush', origin: 'Cederberg, South Africa', lat: -32.30, lng: 19.10 },
  { kw: ['nepali', 'nepal'], tea: 'Nepali Oolong', origin: 'Ilam, Nepal', lat: 26.91, lng: 87.93 },
  { kw: ['bangladeshi', 'bangladesh', 'sylhet', 'srimangal'], tea: 'Bangladeshi Orthodox Tea', origin: 'Sylhet / Srimangal, Bangladesh', lat: 24.31, lng: 91.73 },
  { kw: ['rwandan', 'rwanda'], tea: 'Rwandan High-Elevation Tea', origin: 'Western Province, Rwanda', lat: -2.16, lng: 29.40 },
  { kw: ['lao forest', 'lao tea', 'laos', 'phongsaly', 'luang prabang'], tea: 'Lao Forest Tea', origin: 'Phongsaly / Luang Prabang, Laos', lat: 21.68, lng: 102.10 },
  { kw: ['saffron'], tea: 'Saffron Tea', origin: 'Kashmir & Iran', lat: 34.08, lng: 74.80 },
  { kw: ['osmanthus'], tea: 'Osmanthus Blend', origin: 'Guilin, China', lat: 25.27, lng: 110.29 },
  { kw: ['chrysanthemum'], tea: 'Chrysanthemum', origin: 'Hangzhou / Huangshan, China', lat: 30.13, lng: 118.17 },
  { kw: ['rose'], tea: 'Rose Tea', origin: 'Pingyin, China', lat: 36.30, lng: 116.46 },
];

let teaMap, teaMarker;

function initMap() {
  if (teaMap) return;
  teaMap = L.map('map', { zoomControl: true, attributionControl: false }).setView([25, 90], 3);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18,
  }).addTo(teaMap);
}

function detectOrigin(text) {
  if (!text) return;
  const t = text.toLowerCase();
  const hit = TEA_ORIGINS.find(o => o.kw.some(k => t.includes(k)));
  if (hit) showOrigin(hit);
}

function showOrigin(o) {
  initMap();
  teaMap.flyTo([o.lat, o.lng], 5, { duration: 1.2 });
  if (teaMarker) teaMarker.remove();
  teaMarker = L.marker([o.lat, o.lng]).addTo(teaMap)
    .bindPopup(`<b>${o.tea}</b><br>${o.origin}`).openPopup();
  $('map-info').classList.remove('empty');
  $('map-tea').textContent = o.tea;
  $('map-origin').textContent = o.origin;
}

initMap();

// Inline AudioWorklet that captures mic as PCM16 and posts to main thread
const workletUrl = URL.createObjectURL(new Blob([`
  class P extends AudioWorkletProcessor {
    process(inputs) {
      const ch = inputs[0]?.[0];
      if (ch) {
        const buf = new Int16Array(ch.length);
        for (let i = 0; i < ch.length; i++)
          buf[i] = Math.max(-32768, Math.min(32767, ch[i] * 32767));
        this.port.postMessage(buf.buffer, [buf.buffer]);
      }
      return true;
    }
  }
  registerProcessor("pcm", P);
`], { type: 'application/javascript' }));

// --- Microphone enumeration ---
async function populateMics() {
  if (!navigator.mediaDevices?.enumerateDevices) return;
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const inputs = devices.filter(d => d.kind === 'audioinput');
    const sel = $('mic');
    const current = sel.value;
    while (sel.firstChild) sel.removeChild(sel.firstChild);
    const def = document.createElement('option');
    def.value = '';
    def.textContent = 'Default microphone';
    sel.appendChild(def);
    inputs.forEach((d, i) => {
      const opt = document.createElement('option');
      opt.value = d.deviceId;
      opt.textContent = d.label || `Microphone ${i + 1}`;
      sel.appendChild(opt);
    });
    if (current && inputs.some(d => d.deviceId === current)) sel.value = current;
  } catch (e) { console.warn('enumerateDevices failed', e); }
}
populateMics();
navigator.mediaDevices?.addEventListener?.('devicechange', populateMics);

// --- Voice Agent ---
let ws, ctx, mic;

$('btn').onclick = () => (ws?.readyState <= 1) ? stop() : start();

async function start() {
  const key = $('key').value.trim();
  if (!key) return setStatus('Enter your API key', 'err');
  $('btn').disabled = true;
  setStatus('Connecting…');

  try {
    ctx = new AudioContext({ sampleRate: RATE });
    await ctx.resume();
    await ctx.audioWorklet.addModule(workletUrl);
    const deviceId = $('mic').value;
    mic = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: false,
        ...(deviceId ? { deviceId: { exact: deviceId } } : {}),
      },
    });
    populateMics();
    const source = ctx.createMediaStreamSource(mic);
    const worklet = new AudioWorkletNode(ctx, 'pcm');

    const url = new URL('wss://agents.assemblyai.com/v1/ws');
    url.searchParams.set('token', key);
    ws = new WebSocket(url);
    let ready = false, playT = 0;

    worklet.port.onmessage = ({ data }) => {
      if (!ready || ws.readyState !== 1) return;
      const b = new Uint8Array(data);
      let s = ''; for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
      ws.send(JSON.stringify({ type: 'input.audio', audio: btoa(s) }));
    };
    source.connect(worklet).connect(ctx.destination);

    ws.onopen = () => ws.send(JSON.stringify({
      type: 'session.update',
      session: {
        system_prompt: $('prompt').value,
        greeting: $('greeting').value,
        output: { voice: $('voice').value },
      },
    }));

    ws.onmessage = ({ data }) => {
      const m = JSON.parse(data);
      switch (m.type) {
        case 'input.speech.started':
          setSpeaker('user', true); break;
        case 'input.speech.stopped':
          setSpeaker('user', false); break;
        case 'reply.started':
          setSpeaker('agent', true); break;
        case 'session.ready':
          ready = true;
          setStatus('Connected', 'ok');
          $('btn').disabled = false;
          $('btn-label').textContent = 'Disconnect';
          $('btn').classList.add('on');
          clearEmpty();
          break;

        case 'reply.audio': {
          const raw = atob(m.data);
          const pcm = new Int16Array(raw.length / 2);
          for (let i = 0; i < pcm.length; i++)
            pcm[i] = raw.charCodeAt(i * 2) | (raw.charCodeAt(i * 2 + 1) << 8);
          const f32 = new Float32Array(pcm.length);
          for (let i = 0; i < pcm.length; i++) f32[i] = pcm[i] / 32768;
          const buf = ctx.createBuffer(1, f32.length, RATE);
          buf.getChannelData(0).set(f32);
          const src = ctx.createBufferSource();
          src.buffer = buf; src.connect(ctx.destination);
          playT = Math.max(playT, ctx.currentTime);
          src.start(playT); playT += buf.duration;
          break;
        }

        case 'reply.done':
          setSpeaker('agent', false);
          if (m.status === 'interrupted') playT = ctx.currentTime;
          break;

        case 'transcript.user':
          addMsg('You', m.text, 'u'); break;

        case 'transcript.agent':
          addMsg('Sage: Tea educator', m.text, 'a');
          detectOrigin(m.text);
          break;

        case 'session.error':
          setStatus('Error: ' + m.message, 'err'); break;
      }
    };

    ws.onclose = () => { setStatus('Disconnected'); resetUI(); };
    ws.onerror = () => { setStatus('Connection failed', 'err'); resetUI(); };
  } catch (e) {
    setStatus(e.message, 'err'); resetUI();
  }
}

function stop() {
  ws?.close(); mic?.getTracks().forEach(t => t.stop()); ctx?.close();
  ws = ctx = mic = null; resetUI(); setStatus('Disconnected');
}

function resetUI() {
  $('btn').disabled = false;
  $('btn-label').textContent = 'Connect';
  $('btn').classList.remove('on');
  setSpeaker('user', false);
  setSpeaker('agent', false);
}

function setStatus(msg, cls) {
  $('status-text').textContent = msg;
  $('status').className = 'status' + (cls ? ' ' + cls : '');
}

function setSpeaker(who, active) {
  $('spk-' + who).classList.toggle('active', active);
}

function clearEmpty() {
  const e = $('msgs').querySelector('.empty');
  if (e) e.remove();
}

function addMsg(who, text, cls) {
  clearEmpty();
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  const whoEl = document.createElement('div');
  whoEl.className = 'who';
  whoEl.textContent = who;
  const textEl = document.createElement('div');
  textEl.textContent = text;
  d.appendChild(whoEl);
  d.appendChild(textEl);
  $('msgs').appendChild(d);
  $('msgs').scrollTop = $('msgs').scrollHeight;
}
</script>
</body>
